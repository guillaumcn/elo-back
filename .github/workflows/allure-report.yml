name: Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java

      - name: Run acceptance tests
        run: ./mvnw test -B -Dtest='com.elo.acceptance.CucumberTest'

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz \
            | tar -xz -C /opt
          echo "/opt/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: always()
        run: allure generate target/allure-results --single-file --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/index.html
          retention-days: 30
