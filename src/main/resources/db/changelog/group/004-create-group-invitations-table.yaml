databaseChangeLog:
  - changeSet:
      id: 004-create-group-invitations-table
      author: guillaume
      changes:
        - createTable:
            tableName: group_invitations
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_group_invitations_group
                    references: groups(id)
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: invited_by
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_group_invitations_invited_by
                    references: users(id)
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamptz
                  constraints:
                    nullable: true
