name: Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-java

      - name: Run acceptance tests
        run: ./mvnw test -B -Dtest='com.elo.acceptance.CucumberTest'

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz \
            | tar -xz -C /opt
          echo "/opt/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Load Allure history
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy history into results
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history target/allure-results/history
          fi

      - name: Generate Allure report
        if: always()
        run: allure generate target/allure-results --single-file --clean -o allure-report

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
